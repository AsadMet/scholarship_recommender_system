name: Keep Services Warm
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: curl -sf https://scholarship-recommender-system.onrender.com/api/health || true
      - name: Ping Extraction Service
        run: curl -sf https://scholarship-recommender-system-extraction.onrender.com/health || true
